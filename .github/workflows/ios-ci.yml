name: iOS CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile-ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile-ios/**'
      - '.github/workflows/ios-ci.yml'

jobs:
  build-test:
    name: Build and test SLATEMobile
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Build and test (Simulator)
        working-directory: apps/mobile-ios
        run: |
          set -euo pipefail
          DEST="${SLATE_IOS_SIMULATOR_DESTINATION:-platform=iOS Simulator,name=iPhone 15,OS=latest}"
          echo "Using destination: $DEST"
          xcodebuild \
            -project SLATEMobile.xcodeproj \
            -scheme SLATEMobile \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test
