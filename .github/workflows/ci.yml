# Web + Supabase CI. For root SwiftPM parity with desktop jobs, see desktop-ci.yml
# and scripts/build-root-swift.sh (shared-types first, then swift test).
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  SUPABASE_CLI_VERSION: '1.8.1'

jobs:
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON contracts
        run: |
          for file in contracts/*.json; do
            echo "Validating $file..."
            if ! jq empty "$file"; then
              echo "❌ $file is not valid JSON"
              exit 1
            fi
            echo "✅ $file is valid JSON"
          done
      
      - name: Verify required contracts exist
        run: |
          required=("data-model.json" "web-api.json" "realtime-events.json")
          for file in "${required[@]}"; do
            if [ ! -f "contracts/$file" ]; then
              echo "❌ Required contract $file is missing"
              exit 1
            fi
            echo "✅ Required contract $file exists"
          done

  test-web:
    name: Test Web Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      
      - name: Type check
        working-directory: apps/web
        run: npm run type-check
      
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      
      - name: Test
        working-directory: apps/web
        run: npm run test
      
      - name: Build
        working-directory: apps/web
        run: npm run build

  test-web-e2e:
    name: Test Web Portal E2E
    runs-on: ubuntu-latest
    needs: test-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        run: npm run test:e2e

  test-supabase:
    name: Test Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
      
      - name: Start Supabase
        run: supabase start
        working-directory: supabase
        env:
          SUPABASE_DB_PASSWORD: postgres
      
      - name: Reset database
        run: supabase db reset
        working-directory: supabase
      
      - name: Verify seed data
        run: |
          psql $SUPABASE_DB_URL -c "
            SELECT COUNT(*) as project_count FROM projects;
            SELECT COUNT(*) as clip_count FROM clips;
            SELECT COUNT(*) as annotation_count FROM annotations;
          "
        working-directory: supabase
      
      - name: Check for schema drift
        run: |
          supabase db diff --use-migra --schema public > schema.diff
          if [ -s schema.diff ]; then
            echo "❌ Schema drift detected:"
            cat schema.diff
            exit 1
          else
            echo "✅ No schema drift detected"
          fi
        working-directory: supabase
      
      - name: Stop Supabase
        if: always()
        run: supabase stop
        working-directory: supabase

  deploy-web:
    name: Deploy Web Portal
    runs-on: ubuntu-latest
    needs: [validate-contracts, test-web, test-web-e2e, test-supabase]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: '--prod'
      
      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: '✅ SLATE web portal deployed successfully'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Run benchmark script
        run: ./scripts/benchmark.sh
      
      - name: Post results to PR
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs')
            const results = fs.readFileSync('benchmark-results.json', 'utf8')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚨 Performance Regression Detected\n\n\`\`\`json\n${results}\n\`\`\``
            })
