<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="index.js"></script>
    <style>
      body {
        font-family: sans-serif;
        font-size: 12px;
        margin: 12px;
        color: #e6e6e6;
      }
      label {
        display: block;
        margin-top: 8px;
      }
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
      }
      button {
        margin-top: 12px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 8px;
        margin-top: 12px;
        max-height: 240px;
        overflow: auto;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <p>
      Paste a Frame.io V4 <strong>Bearer</strong> access token (dev only). Obtain via Adobe
      Developer Console + OAuth flow or Postman per Frame.io Getting Started.
    </p>
    <label for="token">Access token</label>
    <input id="token" type="password" autocomplete="off" placeholder="Bearer token" />
    <button id="probe" type="button">GET /v4/me</button>
    <button id="probe-bridge" type="button">GET local /api/nle/projects</button>
    <pre id="out">Ready.</pre>
  </body>
</html>
